<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🎮 La Mia Libreria</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#080c14; --surface:#0e1523; --surface2:#121a2a; --border:#1c2d4a;
      --accent:#00e5ff; --green:#00ff88; --amber:#ffb300;
      --gp-light:#52b043; --muted:#3a4a6a; --text:#cde0f5; --text-dim:#5a7a9a;
      --font-hd:'Orbitron',monospace; --font-bd:'Rajdhani',sans-serif; --r:7px;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-bd); min-height:100dvh; overflow-x:hidden; }
    body::before { content:''; pointer-events:none; position:fixed; inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px); z-index:9999; }

    header { position:sticky; top:0; z-index:100; background:rgba(8,12,20,.94); backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border); padding:13px 18px; display:flex; align-items:center; gap:10px; }
    .h-icon { font-size:20px; animation:glow-pulse 3s ease-in-out infinite; }
    @keyframes glow-pulse { 0%,100%{filter:drop-shadow(0 0 4px var(--accent))} 50%{filter:drop-shadow(0 0 14px var(--accent))} }
    .h-title { font-family:var(--font-hd); font-size:clamp(12px,3.8vw,17px); font-weight:900;
      letter-spacing:.09em; color:var(--accent); text-shadow:0 0 18px rgba(0,229,255,.4); flex:1; }
    .h-count { font-family:var(--font-hd); font-size:11px; color:var(--text-dim); letter-spacing:.1em; }

    .stats-bar { display:flex; gap:1px; background:var(--border); border-bottom:1px solid var(--border); overflow-x:auto; scrollbar-width:none; }
    .stats-bar::-webkit-scrollbar { display:none; }
    .stat-chip { flex:1; min-width:72px; background:var(--surface); padding:11px 6px; text-align:center;
      cursor:pointer; transition:background .15s; position:relative; user-select:none; }
    .stat-chip:hover { background:var(--surface2); }
    .stat-chip.active { background:var(--bg); }
    .stat-chip.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; }
    .stat-chip[data-f="tutti"].active::after      { background:var(--text-dim); }
    .stat-chip[data-f="completato"].active::after { background:var(--green);  box-shadow:0 0 8px var(--green); }
    .stat-chip[data-f="in corso"].active::after   { background:var(--accent); box-shadow:0 0 8px var(--accent); }
    .stat-chip[data-f="wishlist"].active::after   { background:var(--amber);  box-shadow:0 0 8px var(--amber); }
    .stat-num { font-family:var(--font-hd); font-size:19px; font-weight:700; display:block; }
    .stat-chip[data-f="tutti"]      .stat-num { color:var(--text); }
    .stat-chip[data-f="completato"] .stat-num { color:var(--green); }
    .stat-chip[data-f="in corso"]   .stat-num { color:var(--accent); }
    .stat-chip[data-f="wishlist"]   .stat-num { color:var(--amber); }
    .stat-lbl { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); margin-top:1px; display:block; }

    .search-row { padding:13px 16px 8px; display:flex; gap:8px; }
    .search-wrap { position:relative; flex:1; }
    .search-wrap svg { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text-dim); pointer-events:none; }
    #search { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
      color:var(--text); font-family:var(--font-bd); font-size:15px; padding:9px 12px 9px 36px; outline:none;
      transition:border-color .2s,box-shadow .2s; }
    #search:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(0,229,255,.1); }
    #search::placeholder { color:var(--text-dim); }
    #gp-toggle { flex-shrink:0; background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
      padding:9px 13px; cursor:pointer; font-family:var(--font-bd); font-size:13px; letter-spacing:.06em;
      color:var(--text-dim); transition:all .2s; white-space:nowrap; display:flex; align-items:center; gap:6px; }
    #gp-toggle.active { border-color:var(--gp-light); color:var(--gp-light); background:rgba(82,176,67,.1); }
    .gp-dot { width:8px; height:8px; border-radius:50%; background:var(--gp-light); }

    .platforms-wrap { padding:0 16px 12px; display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; }
    .platforms-wrap::-webkit-scrollbar { display:none; }
    .pill { flex-shrink:0; background:var(--surface); border:1px solid var(--border); border-radius:20px;
      padding:4px 13px; font-size:12px; letter-spacing:.07em; text-transform:uppercase; color:var(--text-dim);
      cursor:pointer; transition:all .18s; white-space:nowrap; }
    .pill.active, .pill:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,.07); }

    .grid { padding:0 14px 100px; display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:10px; }

    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
      padding:14px 14px 12px; position:relative; overflow:hidden;
      transition:transform .18s,border-color .18s,box-shadow .18s; animation:card-in .3s ease both; }
    @keyframes card-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .card:hover { transform:translateY(-2px); border-color:var(--muted); box-shadow:0 6px 28px rgba(0,0,0,.5); }
    .card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
    .card[data-s="completato"]::before { background:var(--green);  box-shadow:0 0 8px var(--green); }
    .card[data-s="in corso"]::before   { background:var(--accent); box-shadow:0 0 8px var(--accent); }
    .card[data-s="wishlist"]::before   { background:var(--amber); }
    .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:8px; }
    .card-title { font-family:var(--font-hd); font-size:clamp(11px,3.2vw,14px); font-weight:700;
      letter-spacing:.04em; color:var(--text); line-height:1.35; }
    .badges { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
    .badge-status { font-size:9px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; padding:2px 7px; border-radius:3px; }
    .badge-status.completato { background:rgba(0,255,136,.12); color:var(--green);  border:1px solid rgba(0,255,136,.28); }
    .badge-status.in-corso   { background:rgba(0,229,255,.12); color:var(--accent); border:1px solid rgba(0,229,255,.28); }
    .badge-status.wishlist   { background:rgba(255,179,0,.12); color:var(--amber);  border:1px solid rgba(255,179,0,.28); }
    .badge-gp { font-size:9px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; padding:2px 7px; border-radius:3px;
      background:rgba(82,176,67,.14); color:var(--gp-light); border:1px solid rgba(82,176,67,.3); }
    .card-platform { font-size:12px; color:var(--text-dim); letter-spacing:.06em; text-transform:uppercase;
      margin-bottom:6px; display:flex; align-items:center; gap:5px; }
    .card-platform::before { content:'▸'; color:var(--muted); font-size:9px; }
    .card-meta { display:flex; flex-wrap:wrap; gap:8px 16px; margin-top:6px; }
    .meta-item { display:flex; align-items:center; gap:5px; font-size:13px; color:var(--text-dim); }
    .meta-item span { color:var(--text); font-weight:500; }

    .state-wrap { padding:80px 20px; text-align:center; }
    .state-icon { font-size:46px; display:block; margin-bottom:14px; }
    .state-title { font-family:var(--font-hd); font-size:15px; color:var(--text-dim); letter-spacing:.08em; }
    .state-sub { font-size:13px; color:var(--muted); margin-top:8px; line-height:1.6; font-family:monospace; }
    .spinner { width:38px; height:38px; border:3px solid var(--border); border-top-color:var(--accent);
      border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 14px; }
    @keyframes spin { to{transform:rotate(360deg)} }

    footer { position:fixed; bottom:0; left:0; right:0; background:rgba(8,12,20,.96); backdrop-filter:blur(14px);
      border-top:1px solid var(--border); padding:9px 18px; display:flex; justify-content:space-between;
      align-items:center; font-size:11px; color:var(--text-dim); letter-spacing:.05em; }

    @media(max-width:380px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>

<header>
  <span class="h-icon">🕹️</span>
  <span class="h-title">LA MIA LIBRERIA</span>
  <span class="h-count" id="h-count">—</span>
</header>

<div class="stats-bar">
  <div class="stat-chip active" data-f="tutti"      onclick="setStatus(this)"><span class="stat-num" id="cn-t">0</span><span class="stat-lbl">Tutti</span></div>
  <div class="stat-chip"        data-f="completato" onclick="setStatus(this)"><span class="stat-num" id="cn-c">0</span><span class="stat-lbl">Completati</span></div>
  <div class="stat-chip"        data-f="in corso"   onclick="setStatus(this)"><span class="stat-num" id="cn-i">0</span><span class="stat-lbl">In Corso</span></div>
  <div class="stat-chip"        data-f="wishlist"   onclick="setStatus(this)"><span class="stat-num" id="cn-w">0</span><span class="stat-lbl">Wishlist</span></div>
</div>

<div class="search-row">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="search" placeholder="Cerca gioco…" autocomplete="off" />
  </div>
  <button id="gp-toggle" onclick="toggleGP()">
    <span class="gp-dot"></span>Game Pass
  </button>
</div>

<div class="platforms-wrap" id="platforms"></div>

<main><div class="grid" id="grid">
  <div class="state-wrap"><div class="spinner"></div><p class="state-title">CARICAMENTO…</p></div>
</div></main>

<footer>
  <span>🎮 GAME TRACKER</span>
  <span id="upd"></span>
</footer>

<script>
// =============================================
// ⚠️  INCOLLA QUI L'URL DEL TUO APPS SCRIPT
// =============================================
var API_URL = "https://script.google.com/macros/s/AKfycbyGXbiSkgq74eWE4oBFbrCPuUozOCtOvLEHcVR-BIqKRBGVonpEMw8DPWf13spHmy9_/exec";

var allGames = [];
var fStatus = "tutti", fPlatform = "tutte", fGP = false, fSearch = "";

// Carica i dati: prima prova fetch, poi fallback JSONP
function loadData() {
  fetch(API_URL)
    .then(function(res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    })
    .then(onData)
    .catch(function() {
      // CORS bloccato: usa JSONP
      var done = false;
      var timer = setTimeout(function() {
        if (!done) showError("Timeout. Ricarica la pagina.");
      }, 10000);

      window.__gt_cb = function(data) {
        done = true;
        clearTimeout(timer);
        onData(data);
      };

      var s = document.createElement("script");
      s.src = API_URL + "?callback=__gt_cb";
      s.onerror = function() {
        clearTimeout(timer);
        showError("Impossibile caricare i dati.\nURL corretto? Distribuzione pubblica?");
      };
      document.head.appendChild(s);
    });
}

function onData(data) {
  allGames = Array.isArray(data.games) ? data.games : [];
  if (data.updatedAt) {
    document.getElementById("upd").textContent =
      "AGG. " + new Date(data.updatedAt).toLocaleTimeString("it-IT", {hour:"2-digit", minute:"2-digit"});
  }
  buildPills();
  updateStats();
  render();
}

function updateStats() {
  var c = {tutti: allGames.length, completato: 0, "in corso": 0, wishlist: 0};
  allGames.forEach(function(g) {
    var s = g.stato || "";
    if (c[s] !== undefined) c[s]++;
  });
  document.getElementById("cn-t").textContent = c["tutti"];
  document.getElementById("cn-c").textContent = c["completato"];
  document.getElementById("cn-i").textContent = c["in corso"];
  document.getElementById("cn-w").textContent = c["wishlist"];
  document.getElementById("h-count").textContent = c["tutti"] + " GIOCHI";
}

function buildPills() {
  var seen = {}, platforms = ["Tutte"];
  allGames.forEach(function(g) {
    var p = g.piattaforma || "";
    if (p && !seen[p]) { seen[p] = true; platforms.push(p); }
  });
  document.getElementById("platforms").innerHTML = platforms.map(function(p) {
    return '<button class="pill' + (p === "Tutte" ? " active" : "") +
      '" onclick="setPlatform(this,\'' + esc(p) + '\')">' + esc(p) + '</button>';
  }).join("");
}

function setStatus(el) {
  document.querySelectorAll(".stat-chip").forEach(function(c) { c.classList.remove("active"); });
  el.classList.add("active");
  fStatus = el.getAttribute("data-f");
  render();
}
function setPlatform(el, p) {
  document.querySelectorAll(".pill").forEach(function(x) { x.classList.remove("active"); });
  el.classList.add("active");
  fPlatform = p.toLowerCase();
  render();
}
function toggleGP() {
  fGP = !fGP;
  document.getElementById("gp-toggle").classList.toggle("active", fGP);
  render();
}
document.getElementById("search").addEventListener("input", function(e) {
  fSearch = e.target.value.toLowerCase().trim();
  render();
});

function render() {
  var grid = document.getElementById("grid");
  var list = allGames.filter(function(g) {
    var stato = g.stato || "";
    var piatt = (g.piattaforma || "").toLowerCase();
    var titolo = (g.titolo || "").toLowerCase();
    if (fStatus !== "tutti" && stato !== fStatus) return false;
    if (fPlatform !== "tutte" && piatt !== fPlatform) return false;
    if (fGP && !g.gamepass) return false;
    if (fSearch && titolo.indexOf(fSearch) < 0) return false;
    return true;
  });

  if (!list.length) {
    grid.innerHTML = '<div class="state-wrap"><span class="state-icon">👾</span>' +
      '<p class="state-title">NESSUN GIOCO TROVATO</p>' +
      '<p class="state-sub">Prova a cambiare filtri o ricerca.</p></div>';
    return;
  }

  var labels = {completato:"Completato", "in corso":"In Corso", wishlist:"Wishlist"};
  var calSvg = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>';
  var clkSvg = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>';

  grid.innerHTML = list.map(function(g, i) {
    var stato = g.stato || "wishlist";
    var bc = stato.replace(" ", "-");
    var label = labels[stato] || stato;
    var titolo = g.titolo || "—";
    var piatt = g.piattaforma || "";
    var meta = [];
    if (stato === "completato" && g.fine)
      meta.push('<div class="meta-item">' + calSvg + '&nbsp;Fine:&nbsp;<span>' + esc(g.fine) + '</span></div>');
    if (stato === "in corso" && g.inizio)
      meta.push('<div class="meta-item">' + calSvg + '&nbsp;Dal:&nbsp;<span>' + esc(g.inizio) + '</span></div>');
    if (g.ore && g.ore !== "0" && g.ore !== "")
      meta.push('<div class="meta-item">' + clkSvg + '&nbsp;<span>' + esc(g.ore) + 'h</span></div>');

    return '<div class="card" data-s="' + esc(stato) + '" style="animation-delay:' + Math.min(i * 25, 300) + 'ms">' +
      '<div class="card-top">' +
        '<span class="card-title">' + esc(titolo) + '</span>' +
        '<div class="badges">' +
          '<span class="badge-status ' + bc + '">' + esc(label) + '</span>' +
          (g.gamepass ? '<span class="badge-gp">Game Pass</span>' : '') +
        '</div>' +
      '</div>' +
      (piatt ? '<div class="card-platform">' + esc(piatt) + '</div>' : '') +
      (meta.length ? '<div class="card-meta">' + meta.join("") + '</div>' : '') +
    '</div>';
  }).join("");
}

function showError(msg) {
  document.getElementById("grid").innerHTML =
    '<div class="state-wrap"><span class="state-icon">⚠️</span>' +
    '<p class="state-title">ERRORE DI CARICAMENTO</p>' +
    '<p class="state-sub">' + esc(msg) + '</p></div>';
}

function esc(s) {
  return String(s || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Avvia
loadData();
</script>
</body>
</html>
